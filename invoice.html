<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Tagging - child 1</title>
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    <script src="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.js"></script>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <!--   Load script first so that containerId is available. -->
    <script src="script.js"></script>

    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', containerId);
    </script>

    <script>
        if (!isGtm) {
            document.write(
                '<scri' + 'pt async src="' + ctfeUrl + '/gtag/js?id=' + containerId + '"></scr' + 'ipt>');
        }
    </script>


</head>

<body>
    <h1>Oder confirmation page</h1>
    <h2>
        This page loads container: <span>
            <script>document.write(containerId)</script>
        </span>
    </h2>
    <div>
        The referrer is
        <script>document.write(document.referrer || 'none')</script>
    </div>

    <br />


    <div>
        <div id="transaction-id">
            <span>Your order id: </span><span>#ABC-123-AHF</span>
        </div>
        <div id="purchase-val">
            <span>Your order total: </span><span>£10.00</span>
        </div>

        <div class="wd-email">
            <span>Your email is: </span><span>foo@example.com</span>
        </div>
    </div>

    <br />
    <br />
    <div>
        <h4>Data layer:</h4>
        <pre id="dataLayer"></pre>
    </div>
    <br />
</body>

</html>
