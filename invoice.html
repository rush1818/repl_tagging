<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Tagging - child 1</title>
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    <script src="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.js"></script>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <script src="darkmode.js"></script>
    <!-- Load core tagging library -->
    <script src="ctfe.js"></script>
    <!-- Load page script -->
    <script src="script.js"></script>


</head>

<body>
  <header class="app-header">
    <div class="header-title">Test Page</div>
    <div class="theme-switcher">
      <button id="theme-toggle-btn" class="theme-btn">Theme</button>
      <div id="theme-dropdown" class="theme-dropdown-content">
        <button data-theme="light">Light</button>
        <button data-theme="dark">Dark</button>
        <button data-theme="system">System</button>
      </div>
    </div>
  </header>
    <h1>Oder confirmation page</h1>
    <h2>
        This page loads tags: <span id="loadedTags"></span>
    </h2>
    <div>
        The referrer is
        <script>document.write(document.referrer || 'none')</script>
    </div>

    <br />


    <div>
        <div id="transaction-id">
            <span>Your order id: </span><span>#ABC-123-AHF</span>
        </div>
        <div id="purchase-val">
            <span>Your order total: </span><span>£10.00</span>
        </div>

        <div class="wd-email">
            <span>Your email is: </span><span>foo@example.com</span>
        </div>
    </div>

    <br />
    <br />
    <div>
        <h4>Data layer:</h4>
        <pre id="dataLayer"></pre>
    </div>
    <br />
</body>

</html>
